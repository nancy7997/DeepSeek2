<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Karaoke Roulette</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" async></script>
    <style>
        :root {
            --green: #1DB954;
            --black: #121212;
            --dark: #282828;
            --blue: #3498db;
            --text: #FFFFFF;
            --red: #e74c3c;
            --yellow: #f1c40f;
            --purple: #9b59b6;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--black);
            color: var(--text);
            height: 100dvh;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .intro-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }
        .intro-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .intro-category-tag {
            position: absolute;
            font-size: 1.3em;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
            opacity: 0;
            animation: floatFade 3s ease-in-out forwards;
            text-shadow: 0 0 12px currentColor;
            white-space: nowrap;
        }
        @keyframes floatFade {
            0% { opacity: 0; transform: translate(0, 0) scale(0.7) rotate(0deg); }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--drift-x), var(--drift-y)) scale(1.2) rotate(var(--drift-rotate)); }
        }

        .intro-row {
            display: flex;
            white-space: nowrap;
            margin: 8px 0;
            position: relative;
            z-index: 2;
            animation: slideIn 1.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .intro-row:nth-child(2) { animation-delay: 0.3s; }
        .block-letter {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 900;
            display: inline-block;
            margin: 0 2px;
            padding: 4px 8px;
            animation: bounce 0.5s infinite alternate ease-in-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-24px); }
        }

        .game-container {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: env(safe-area-inset-top, 8px) 12px env(safe-area-inset-bottom, 8px) 12px;
        }
        .game-container.active { display: flex; }

        .header {
            text-align: center;
            padding: 4px 0;
        }
        .team-banner {
            font-size: 1em;
            font-weight: 800;
            color: var(--green);
            letter-spacing: 1px;
        }
        .round-indicator {
            font-size: 0.75em;
            color: #888;
        }

        .scoreboard {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .score-card {
            flex: 1;
            background: var(--dark);
            padding: 10px 8px;
            border-radius: var(--radius);
            text-align: center;
            border: 2px solid transparent;
            transition: border-color 0.3s, background 0.3s;
        }
        .score-card.active {
            border-color: var(--green);
            background: rgba(29, 185, 84, 0.1);
        }
        .score-name {
            font-size: 0.85em;
            font-weight: 700;
            display: block;
        }
        .score-value {
            font-size: 1.8em;
            font-weight: 900;
            color: var(--green);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 6px 0;
        }
        .timer {
            font-size: 2rem;
            font-weight: 800;
            background: #333;
            padding: 6px 16px;
            border-radius: var(--radius);
            min-width: 110px;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }
        .btn {
            padding: 12px 20px;
            border-radius: var(--radius);
            border: none;
            font-weight: 800;
            font-size: 0.9em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.15s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.5; pointer-events: none; }
        .btn-spin { background: var(--green); color: #fff; }
        .btn-stop { background: var(--red); color: #fff; }

        .mode-display {
            font-size: 1.4em;
            font-weight: 900;
            color: var(--blue);
            text-align: center;
            min-height: 1.4em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wheel-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            position: relative;
        }
        .wheel-container {
            position: relative;
            width: min(85vw, 85vh, 360px);
            height: min(85vw, 85vh, 360px);
            aspect-ratio: 1;
        }
        .wheel-container canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #fff;
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.2, 1);
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 30px solid #fff;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .finale-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .finale-overlay.active { display: flex; }

        .congrats-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .congrats-word {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .congrats-letter {
            font-size: clamp(2rem, 7vw, 4.5rem);
            font-weight: 900;
            display: inline-block;
            opacity: 0;
            animation: congratsFadeIn 0.5s forwards ease-out;
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor;
        }
        @keyframes congratsFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.5); }
            60% { opacity: 1; transform: translateY(-5px) scale(1.1); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .winner-name-display {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin: 24px 0 10px 0;
        }
        .winner-letter {
            display: inline-block;
            opacity: 0;
            animation: winnerPopIn 0.6s forwards ease-out;
            text-shadow: 0 0 30px rgba(255,255,255,0.5), 0 0 60px currentColor;
        }
        @keyframes winnerPopIn {
            0% { opacity: 0; transform: scale(0) rotate(-10deg); }
            70% { transform: scale(1.2) rotate(3deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .winner-subtitle {
            font-size: 1.2em;
            color: #ccc;
            margin-bottom: 8px;
            opacity: 0;
            animation: simpleFadeIn 0.8s 1s forwards;
        }
        .score-final {
            font-size: 1.5em;
            color: var(--green);
            font-weight: 700;
            margin-bottom: 32px;
            opacity: 0;
            animation: simpleFadeIn 0.8s 1.3s forwards;
        }
        @keyframes simpleFadeIn { to { opacity: 1; } }

        .play-again-buttons {
            display: flex;
            gap: 20px;
            opacity: 0;
            animation: simpleFadeIn 0.8s 1.6s forwards;
        }
        .btn-finale {
            padding: 16px 36px;
            border-radius: var(--radius);
            border: none;
            font-weight: 800;
            font-size: 1.1em;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.15s, background 0.3s;
        }
        .btn-finale:active { transform: scale(0.95); }
        .btn-yes { background: var(--green); color: #fff; }
        .btn-no { background: #555; color: #fff; }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-card {
            background: var(--dark);
            padding: 24px;
            border-radius: 20px;
            width: 100%;
            max-width: 340px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .modal-card h2 { font-size: 1.3em; color: #fff; }
        .modal-btn {
            width: 100%;
            padding: 16px;
            font-weight: 700;
            border-radius: var(--radius);
            border: none;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .modal-btn:active { transform: scale(0.97); }

        .setup-modal .modal-card { gap: 16px; }
        .setup-modal input {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius);
            border: 1px solid #555;
            background: #333;
            color: #fff;
            font-size: 1em;
            text-align: center;
            outline: none;
        }
        .setup-modal input:focus { border-color: var(--green); }
    </style>
</head>
<body>

    <div class="intro-overlay" id="introOverlay">
        <div class="intro-row" id="introRow1"></div>
        <div class="intro-row" id="introRow2"></div>
    </div>

    <div class="finale-overlay" id="finaleOverlay">
        <div class="congrats-container">
            <div class="congrats-word" id="congratsWord"></div>
        </div>
        <div class="winner-name-display" id="winnerNameDisplay"></div>
        <div class="winner-subtitle" id="winnerSubtitle"></div>
        <div class="score-final" id="scoreFinal"></div>
        <div class="play-again-buttons" id="playAgainButtons">
            <button class="btn-finale btn-yes" id="btnPlayAgain">Yes, Play Again</button>
            <button class="btn-finale btn-no" id="btnStay">No, Stay Here</button>
        </div>
    </div>

    <div class="modal setup-modal" id="setupModal">
        <div class="modal-card">
            <h2>Team Setup</h2>
            <input type="text" id="team1Input" placeholder="Team 1 Name" maxlength="20" autocomplete="off">
            <input type="text" id="team2Input" placeholder="Team 2 Name" maxlength="20" autocomplete="off">
            <button class="modal-btn" style="background:var(--green); color:#fff;" id="startGameBtn">START GAME</button>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="header">
            <div class="team-banner" id="teamBanner">TEAM 1 TURN</div>
            <div class="round-indicator" id="roundIndicator">Round 1 of 5</div>
        </div>

        <div class="scoreboard">
            <div class="score-card active" id="scoreCard1">
                <span class="score-name" id="name1">T1</span>
                <span class="score-value" id="score1">0</span>
            </div>
            <div class="score-card" id="scoreCard2">
                <span class="score-name" id="name2">T2</span>
                <span class="score-value" id="score2">0</span>
            </div>
        </div>

        <div class="controls">
            <div class="timer" id="timer">01:30</div>
            <button class="btn btn-spin" id="spinBtn">Spin Category</button>
            <button class="btn btn-stop" id="stopBtn" style="display:none;">Stop</button>
        </div>

        <div class="mode-display" id="modeDisplay">SPIN TO START</div>

        <div class="wheel-area">
            <div class="wheel-container" id="categoryWheel">
                <div class="pointer"></div>
                <canvas id="catCanvas" width="800" height="800"></canvas>
            </div>
        </div>
    </div>

    <div class="modal" id="modeModal">
        <div class="modal-card">
            <h2>Spin for Mode</h2>
            <div class="wheel-container" style="width:260px; height:260px;">
                <div class="pointer"></div>
                <canvas id="modeCanvas" width="600" height="600"></canvas>
            </div>
            <button class="modal-btn" style="background:var(--blue); color:#fff;" id="modeSpinBtn">SPIN</button>
        </div>
    </div>

    <div class="modal" id="karaokeScoreModal">
        <div class="modal-card">
            <h2>Did they sing?</h2>
            <button class="modal-btn" style="background:var(--green); color:#fff;" data-points="100">YES (100 pts)</button>
            <button class="modal-btn" style="background:var(--yellow); color:#000;" data-points="25">OTHER (25 pts)</button>
            <button class="modal-btn" style="background:var(--red); color:#fff;" data-points="0">NO (0 pts)</button>
        </div>
    </div>

    <div class="modal" id="guessScoreModal">
        <div class="modal-card">
            <h2>Result?</h2>
            <button class="modal-btn" style="background:var(--green); color:#fff;" data-points="50">BOTH (50 pts)</button>
            <button class="modal-btn" style="background:var(--blue); color:#fff;" data-points="15">ARTIST ONLY (15 pts)</button>
            <button class="modal-btn" style="background:var(--purple); color:#fff;" data-points="10">SONG ONLY (10 pts)</button>
            <button class="modal-btn" style="background:var(--red); color:#fff;" data-points="0">NONE (0 pts)</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const CATEGORIES = ["1950s-1970s", "1980s", "1990s", "2000s", "2010s", "2020s", "Host's Choice"];
        const SLICE_COLORS = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4'];
        const CONGRATS_COLORS = ['#e6194B', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#42d4f4', '#1DB954', '#FF6B6B', '#FFD93D'];
        const MODES = ["KARAOKE", "NAME THAT SONG"];
        const MODE_COLORS = ["#1DB954", "#3498db"];
        const TOTAL_ROUNDS = 5;
        const TOTAL_TURNS = TOTAL_ROUNDS * 2;
        const TURN_TIME = 90;
        const INTRO_DURATION = 4500;

        const SPOTIFY_PLAYLISTS = {
            '1950s-1970s': { karaoke: '3WVlgzjhkxXiOZ67NImFyg', nameThatTune: '3WVlgzjhkxXiOZ67NImFyg' },
            '1980s': { karaoke: '39FPPJjeOH2Ilr3WAlGb10', nameThatTune: '39FPPJjeOH2Ilr3WAlGb10' },
            '1990s': { karaoke: '7c4ppKG2IyUKaCHmKHq91O', nameThatTune: '7c4ppKG2IyUKaCHmKHq91O' },
            '2000s': { karaoke: '0PXnNmNOYBnSR79ElpLIHe', nameThatTune: '0PXnNmNOYBnSR79ElpLIHe' },
            '2010s': { karaoke: '3Xr0QIutddzftYZP40iu6P', nameThatTune: '3Xr0QIutddzftYZP40iu6P' },
            '2020s': { karaoke: '7GY5VrekWyTMEBn5tfjivv', nameThatTune: '7GY5VrekWyTMEBn5tfjivv' },
            "Host's Choice": { karaoke: '3WVlgzjhkxXiOZ67NImFyg', nameThatTune: '3WVlgzjhkxXiOZ67NImFyg' }
        };

        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        const dom = {
            introOverlay: $('#introOverlay'),
            introRow1: $('#introRow1'),
            introRow2: $('#introRow2'),
            finaleOverlay: $('#finaleOverlay'),
            congratsWord: $('#congratsWord'),
            winnerNameDisplay: $('#winnerNameDisplay'),
            winnerSubtitle: $('#winnerSubtitle'),
            scoreFinal: $('#scoreFinal'),
            playAgainButtons: $('#playAgainButtons'),
            btnPlayAgain: $('#btnPlayAgain'),
            btnStay: $('#btnStay'),
            setupModal: $('#setupModal'),
            team1Input: $('#team1Input'),
            team2Input: $('#team2Input'),
            startGameBtn: $('#startGameBtn'),
            gameContainer: $('#gameContainer'),
            teamBanner: $('#teamBanner'),
            roundIndicator: $('#roundIndicator'),
            scoreCard1: $('#scoreCard1'),
            scoreCard2: $('#scoreCard2'),
            name1: $('#name1'),
            name2: $('#name2'),
            score1: $('#score1'),
            score2: $('#score2'),
            timer: $('#timer'),
            spinBtn: $('#spinBtn'),
            stopBtn: $('#stopBtn'),
            modeDisplay: $('#modeDisplay'),
            catCanvas: $('#catCanvas'),
            modeModal: $('#modeModal'),
            modeCanvas: $('#modeCanvas'),
            modeSpinBtn: $('#modeSpinBtn'),
            karaokeScoreModal: $('#karaokeScoreModal'),
            guessScoreModal: $('#guessScoreModal'),
        };

        const state = {
            team1Name: '', team2Name: '',
            currentTeam: 1, scores: [0, 0], turnCount: 0,
            activeMode: '', currentCategory: '',
            catRotation: 0, modeRotation: 0,
            countdownInterval: null, timerSeconds: TURN_TIME,
            isSpinning: false, categoryTagInterval: null,
            spotifyPlayerWindow: null,
        };

        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `0${m}:${s.toString().padStart(2, '0')}`;
        }

        function showModal(modal) { modal.classList.add('active'); }
        function hideModals() { $$('.modal').forEach(m => m.classList.remove('active')); }

        function drawWheel(canvas, slices, colors, opts = {}) {
            const ctx = canvas.getContext('2d');
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const radius = Math.min(cx, cy) - 10;
            const numSlices = slices.length;
            const angle = (Math.PI * 2) / numSlices;
            const fontSize = opts.fontSize || 45;
            const textColor = opts.textColor || 'black';

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < numSlices; i++) {
                const startAngle = i * angle;
                const endAngle = (i + 1) * angle;
                
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                const midAngle = startAngle + angle / 2;
                ctx.rotate(midAngle);
                ctx.textAlign = 'center';
                ctx.fillStyle = textColor;
                ctx.font = `bold ${fontSize}px sans-serif`;

                const text = slices[i];
                const textRadius = radius * 0.62;
                
                if (opts.multilineSplit && text.includes(' ')) {
                    const words = text.split(' ');
                    const mid = Math.ceil(words.length / 2);
                    const line1 = words.slice(0, mid).join(' ');
                    const line2 = words.slice(mid).join(' ');
                    const lineHeight = fontSize * 1.2;
                    ctx.fillText(line1, textRadius, -lineHeight / 2 + fontSize * 0.3);
                    ctx.fillText(line2, textRadius, lineHeight / 2 + fontSize * 0.3);
                } else {
                    ctx.fillText(text, textRadius, fontSize * 0.35);
                }
                ctx.restore();
            }
        }

        function drawCategoryWheel() {
            drawWheel(dom.catCanvas, CATEGORIES, SLICE_COLORS, { fontSize: 42, textColor: 'black', multilineSplit: false });
        }

        function drawModeWheel() {
            drawWheel(dom.modeCanvas, MODES, MODE_COLORS, { fontSize: 38, textColor: 'white', multilineSplit: true });
        }

        function spinWheel(canvas, slices, rotationRef) {
            const prize = Math.floor(Math.random() * slices.length);
            const sliceDeg = 360 / slices.length;
            const stopAngle = 270 - (prize * sliceDeg) - (sliceDeg / 2);
            const fullSpins = 360 * (5 + Math.floor(Math.random() * 4));
            const newRotation = rotationRef.val + fullSpins + (stopAngle - (rotationRef.val % 360));
            rotationRef.val = newRotation;
            canvas.style.transform = `rotate(${newRotation}deg)`;
            return { prize, duration: 4000 };
        }

        const catRotationRef = { val: 0 };
        const modeRotationRef = { val: 0 };

        function spinCategory() {
            if (state.isSpinning) return;
            state.isSpinning = true;
            dom.spinBtn.disabled = true;
            dom.modeDisplay.textContent = 'SPINNING...';
            dom.modeDisplay.style.color = 'var(--blue)';

            const { prize, duration } = spinWheel(dom.catCanvas, CATEGORIES, catRotationRef);
            state.currentCategory = CATEGORIES[prize];

            setTimeout(() => {
                showModal(dom.modeModal);
                dom.modeSpinBtn.style.display = 'block';
            }, duration + 500);
        }

        function spinModeWheel() {
            dom.modeSpinBtn.style.display = 'none';
            const { prize } = spinWheel(dom.modeCanvas, MODES, modeRotationRef);
            setTimeout(() => finalizeMode(prize), 4500 + 1000);
        }

        function finalizeMode(index) {
            state.activeMode = MODES[index];
            dom.modeModal.classList.remove('active');
            dom.modeDisplay.textContent = state.activeMode;
            dom.modeDisplay.style.color = MODE_COLORS[index];
            dom.stopBtn.style.display = 'inline-block';
            state.isSpinning = false;
            playSpotifyForCurrentMode();
            startTimer();
        }

        function startTimer() {
            state.timerSeconds = TURN_TIME;
            dom.timer.textContent = formatTime(state.timerSeconds);
            clearInterval(state.countdownInterval);
            state.countdownInterval = setInterval(() => {
                state.timerSeconds--;
                dom.timer.textContent = formatTime(state.timerSeconds);
                if (state.timerSeconds <= 0) {
                    clearInterval(state.countdownInterval);
                    triggerScoring();
                }
            }, 1000);
        }

        function triggerScoring() {
            clearInterval(state.countdownInterval);
            dom.timer.textContent = formatTime(0);
            if (state.activeMode === 'KARAOKE') {
                showModal(dom.karaokeScoreModal);
            } else {
                showModal(dom.guessScoreModal);
            }
        }

        function recordScore(points) {
            const teamIndex = state.currentTeam - 1;
            state.scores[teamIndex] += points;
            dom.score1.textContent = state.scores[0];
            dom.score2.textContent = state.scores[1];

            state.currentTeam = state.currentTeam === 1 ? 2 : 1;
            hideModals();
            dom.timer.textContent = formatTime(TURN_TIME);
            dom.spinBtn.style.display = 'inline-block';
            dom.spinBtn.disabled = false;
            dom.stopBtn.style.display = 'none';
            dom.modeDisplay.textContent = 'SPIN TO START';
            dom.modeDisplay.style.color = 'var(--blue)';
            dom.scoreCard1.classList.toggle('active');
            dom.scoreCard2.classList.toggle('active');

            state.turnCount++;
            if (state.turnCount >= TOTAL_TURNS) {
                endGame();
                return;
            }

            const currentRound = Math.floor(state.turnCount / 2) + 1;
            dom.roundIndicator.textContent = `Round ${currentRound} of ${TOTAL_ROUNDS}`;
            updateBanner();
        }

        function updateBanner() {
            const name = state.currentTeam === 1 ? state.team1Name : state.team2Name;
            dom.teamBanner.textContent = `${name.toUpperCase()}'S TURN`;
        }

        // Spotify Functions
        function playSpotifyForCurrentMode() {
            if (!state.currentCategory) return;
            const playlists = SPOTIFY_PLAYLISTS[state.currentCategory];
            if (!playlists) return;
            
            const playlistId = state.activeMode === 'NAME THAT SONG' ? playlists.nameThatTune : playlists.karaoke;
            if (!playlistId) return;
            
            // Open Spotify directly - simplest approach for iOS
            const spotifyURL = `spotify:playlist:${playlistId}`;
            const webURL = `https://open.spotify.com/playlist/${playlistId}`;
            
            // Try Spotify app first
            window.location.href = spotifyURL;
            
            // Fallback to web after delay if app doesn't open
            setTimeout(() => {
                if (!document.hidden) {
                    window.open(webURL, '_blank');
                }
            }, 2000);
        }

        function endGame() {
            clearInterval(state.countdownInterval);
            dom.gameContainer.classList.remove('active');
            hideModals();

            const winner = state.scores[0] > state.scores[1] ? state.team1Name :
                          state.scores[1] > state.scores[0] ? state.team2Name : null;
            const isTie = state.scores[0] === state.scores[1];

            buildCongratsWord();
            if (isTie) {
                buildWinnerName('TIE');
                dom.winnerSubtitle.textContent = 'Both teams scored equally!';
            } else {
                buildWinnerName(winner);
                dom.winnerSubtitle.textContent = 'is the Karaoke Roulette Champion!';
            }
            dom.scoreFinal.textContent = `${state.team1Name}: ${state.scores[0]} | ${state.team2Name}: ${state.scores[1]}`;
            dom.finaleOverlay.classList.add('active');
            launchConfettiFromCenter();
        }

        function playAgain() {
            dom.finaleOverlay.classList.remove('active');
            state.scores = [0, 0]; state.turnCount = 0; state.currentTeam = 1;
            state.activeMode = ''; state.currentCategory = ''; state.isSpinning = false;
            catRotationRef.val = 0; modeRotationRef.val = 0;
            clearInterval(state.countdownInterval);
            dom.score1.textContent = '0'; dom.score2.textContent = '0';
            dom.timer.textContent = formatTime(TURN_TIME);
            dom.spinBtn.style.display = 'inline-block'; dom.spinBtn.disabled = false;
            dom.stopBtn.style.display = 'none';
            dom.modeDisplay.textContent = 'SPIN TO START'; dom.modeDisplay.style.color = 'var(--blue)';
            dom.scoreCard1.classList.add('active'); dom.scoreCard2.classList.remove('active');
            dom.roundIndicator.textContent = `Round 1 of ${TOTAL_ROUNDS}`;
            dom.catCanvas.style.transform = 'rotate(0deg)';
            dom.modeCanvas.style.transform = 'rotate(0deg)';
            dom.gameContainer.classList.add('active');
            updateBanner();
        }

        function stayOnFinale() {}

        function buildCongratsWord() {
            dom.congratsWord.innerHTML = '';
            'CONGRATULATIONS'.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = 'congrats-letter';
                span.textContent = char;
                span.style.color = CONGRATS_COLORS[i % CONGRATS_COLORS.length];
                span.style.animationDelay = `${i * 0.08}s`;
                dom.congratsWord.appendChild(span);
            });
        }

        function buildWinnerName(name) {
            dom.winnerNameDisplay.innerHTML = '';
            name.toUpperCase().split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = 'winner-letter';
                span.textContent = char;
                span.style.color = CONGRATS_COLORS[i % CONGRATS_COLORS.length];
                span.style.animationDelay = `${0.6 + i * 0.08}s`;
                dom.winnerNameDisplay.appendChild(span);
            });
        }

        function launchConfettiFromCenter() {
            if (typeof confetti !== 'function') return;
            const bursts = [
                { delay: 200, particleCount: 80, spread: 360, startVelocity: 40, origin: { x: 0.5, y: 0.5 } },
                { delay: 500, particleCount: 60, spread: 360, startVelocity: 45, origin: { x: 0.5, y: 0.5 } },
                { delay: 800, particleCount: 100, spread: 360, startVelocity: 35, origin: { x: 0.5, y: 0.5 } },
                { delay: 1100, particleCount: 70, spread: 360, startVelocity: 50, origin: { x: 0.45, y: 0.45 } },
                { delay: 1400, particleCount: 70, spread: 360, startVelocity: 50, origin: { x: 0.55, y: 0.55 } },
                { delay: 1700, particleCount: 120, spread: 360, startVelocity: 40, origin: { x: 0.5, y: 0.5 } },
                { delay: 2200, particleCount: 90, spread: 360, startVelocity: 45, origin: { x: 0.5, y: 0.5 } },
                { delay: 2800, particleCount: 150, spread: 360, startVelocity: 35, origin: { x: 0.5, y: 0.5 } },
            ];
            bursts.forEach(({ delay, ...opts }) => setTimeout(() => confetti(opts), delay));
            const ongoing = setInterval(() => {
                if (dom.finaleOverlay.classList.contains('active')) {
                    confetti({ particleCount: 40, spread: 360, startVelocity: 30, origin: { x: 0.5, y: 0.5 } });
                } else { clearInterval(ongoing); }
            }, 6000);
        }

        function spawnCategoryTag() {
            const tag = document.createElement('span');
            tag.className = 'intro-category-tag';
            tag.textContent = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
            tag.style.color = SLICE_COLORS[Math.floor(Math.random() * SLICE_COLORS.length)];
            const positions = [
                { top: '5%', left: '3%', driftX: '40px', driftY: '30px', driftRotate: '15deg' },
                { top: '5%', right: '3%', driftX: '-40px', driftY: '30px', driftRotate: '-15deg' },
                { bottom: '8%', left: '3%', driftX: '40px', driftY: '-30px', driftRotate: '-10deg' },
                { bottom: '8%', right: '3%', driftX: '-40px', driftY: '-30px', driftRotate: '10deg' },
                { top: '2%', left: '40%', driftX: '0px', driftY: '50px', driftRotate: '20deg' },
                { bottom: '5%', left: '35%', driftX: '0px', driftY: '-50px', driftRotate: '-20deg' },
                { top: '45%', left: '1%', driftX: '60px', driftY: '0px', driftRotate: '25deg' },
                { top: '45%', right: '1%', driftX: '-60px', driftY: '0px', driftRotate: '-25deg' },
            ];
            const pos = positions[Math.floor(Math.random() * positions.length)];
            Object.entries(pos).forEach(([key, val]) => {
                if (key === 'driftX' || key === 'driftY' || key === 'driftRotate') return;
                tag.style[key] = typeof val === 'string' ? val : '';
            });
            tag.style.setProperty('--drift-x', pos.driftX);
            tag.style.setProperty('--drift-y', pos.driftY);
            tag.style.setProperty('--drift-rotate', pos.driftRotate);
            tag.style.fontSize = `${1 + Math.random() * 1.0}em`;
            dom.introOverlay.appendChild(tag);
            tag.addEventListener('animationend', () => tag.remove());
        }

        function startCategoryTags() {
            spawnCategoryTag();
            state.categoryTagInterval = setInterval(() => spawnCategoryTag(), 200 + Math.random() * 400);
        }
        function stopCategoryTags() {
            clearInterval(state.categoryTagInterval);
            dom.introOverlay.querySelectorAll('.intro-category-tag').forEach(t => t.remove());
        }

        function buildIntro() {
            const createLetters = (text, container, colorOffset) => {
                text.split('').forEach((char, i) => {
                    const span = document.createElement('span');
                    span.className = 'block-letter';
                    span.textContent = char;
                    span.style.color = SLICE_COLORS[(i + colorOffset) % SLICE_COLORS.length];
                    span.style.animationDelay = `${i * 0.08}s`;
                    container.appendChild(span);
                });
            };
            createLetters('KARAOKE', dom.introRow1, 0);
            createLetters('ROULETTE', dom.introRow2, 3);
            startCategoryTags();
            setTimeout(() => {
                stopCategoryTags();
                dom.introOverlay.classList.add('fade-out');
                setTimeout(() => {
                    dom.introOverlay.style.display = 'none';
                    showModal(dom.setupModal);
                    dom.team1Input.focus();
                }, 800);
            }, INTRO_DURATION);
        }

        function startGame() {
            state.team1Name = dom.team1Input.value.trim() || 'Team 1';
            state.team2Name = dom.team2Input.value.trim() || 'Team 2';
            dom.name1.textContent = state.team1Name.toUpperCase();
            dom.name2.textContent = state.team2Name.toUpperCase();
            hideModals();
            dom.gameContainer.classList.add('active');
            drawCategoryWheel();
            drawModeWheel();
            updateBanner();
            dom.roundIndicator.textContent = `Round 1 of ${TOTAL_ROUNDS}`;
        }

        dom.startGameBtn.addEventListener('click', startGame);
        dom.team2Input.addEventListener('keydown', e => { if (e.key === 'Enter') startGame(); });
        dom.spinBtn.addEventListener('click', spinCategory);
        dom.stopBtn.addEventListener('click', () => { if (!state.isSpinning) triggerScoring(); });
        dom.modeSpinBtn.addEventListener('click', spinModeWheel);

        dom.karaokeScoreModal.querySelectorAll('[data-points]').forEach(btn => {
            btn.addEventListener('click', () => recordScore(parseInt(btn.dataset.points)));
        });
        dom.guessScoreModal.querySelectorAll('[data-points]').forEach(btn => {
            btn.addEventListener('click', () => recordScore(parseInt(btn.dataset.points)));
        });

        dom.btnPlayAgain.addEventListener('click', playAgain);
        dom.btnStay.addEventListener('click', stayOnFinale);

        buildIntro();
    })();
    </script>
</body>
</html>
